<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wepice Store - Login</title>
    <style>
        body { 
            background-color: #2e3440; 
            color: #d8dee9; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
        }

        /* Login Box Style */
        #login-container {
            background-color: #3b4252;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            background-color: #4c566a;
            color: white;
            box-sizing: border-box;
        }

        .login-btn {
            background-color: #88c0d0;
            color: #2e3440;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Shop Section (Hidden by default) */
        #shop-section {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
        }

        header { 
            background-color: #3b4252; 
            width: 100%; 
            padding: 20px 0; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: fixed;
            top: 0;
        }

        .shop-container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            padding-top: 120px;
            padding-bottom: 40px;
        }

        .item-card { 
            background-color: #434c5e; 
            border-radius: 12px; 
            padding: 20px; 
            width: 200px; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .game-logo { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            margin-bottom: 10px; 
        }

        .buy-btn { 
            background-color: #a3be8c; 
            color: #2e3440; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 5px; 
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="login-container">
        <h2 style="color: #88c0d0;">Member Login</h2>
        <p style="font-size: 0.8rem; color: #abb2bf;">Enter your ID to access store</p>
        <input type="text" id="username" placeholder="Game ID / Username">
        <input type="password" id="password" placeholder="Password">
        <button class="login-btn" onclick="handleLogin()">Login</button>
    </div>

    <div id="shop-section">
        <header>
            <h1 id="welcome-msg" style="margin:0; font-size: 1.5rem; color: #88c0d0;">WEPICE STORE</h1>
            <p id="user-display" style="margin:5px 0 0; font-size: 0.8rem; color: #a3be8c;"></p>
        </header>

        <div class="shop-container">
            <div class="item-card">
                <img src="https://images.rbxcdn.com/cece577579c986c478c903a48e89f825.jpg" class="game-logo">
                <p>Roblox Robux</p>
                <button class="buy-btn">Top Up</button>
            </div>
            <div class="item-card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_pB6yS-g2G_X2309fO0fG6M9n7V-A1eA0sw&s" class="game-logo">
                <p>Free Fire</p>
                <button class="buy-btn">Top Up</button>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user !== "" && pass !== "") {
                // Hide login, show shop
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('shop-section').style.display = 'flex';
                document.body.style.justifyContent = 'flex-start';
                
                // Display user name
                document.getElementById('user-display').innerText = "Logged in as: " + user;
                alert("Login Successful! Welcome, " + user);
            } else {
                alert("Please enter Username and Password");
            }
        }
    </script>

</body>
</html>
